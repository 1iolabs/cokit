# Clippy Configuration
# See:
# - https://doc.rust-lang.org/stable/clippy/lint_configuration.html
msrv = "1.91.0"
type-complexity-threshold = 300 # default: 250
large-error-threshold = 256 # default: 128
enum-variant-size-threshold = 300 # default: 200
future-size-threshold = 16384 # default: 16384
stack-size-threshold = 512000 # default: 512000
