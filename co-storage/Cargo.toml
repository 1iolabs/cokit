[package]
name = "co-storage"
version = "0.1.0"
edition = "2021"

[dependencies]
aead = { version = "0.5.2", features = ["stream"] }
anyhow = { workspace = true }
async-trait = { workspace = true }
blake3 = "=1.5.0"
chacha20poly1305 = "=0.10.1"
co-primitives = { path = "../co-primitives" }
either = { workspace = true }
futures = { workspace = true }
libipld = { workspace = true, features = ["default", "serde-codec"] }
names = "0.14.0"
rust-unixfs = { workspace = true }
rxrust = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_bytes = { workspace = true }
serde_ipld_dagcbor = { workspace = true }
serde_json = { workspace = true }
serde_repr = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "fs", "rt"] }
tokio-stream = { workspace = true }
tokio-util = { workspace = true, features = ["compat"] }
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
hexdump = "0.1.1"
insta = { version = "1.34.0", features = ["default", "yaml"] }
tracing-subscriber = { workspace = true }
