name: Release Binaries
on:
  push:
    tags:
      - 'co-cli-v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tgz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tgz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tgz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tgz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build binary
        run: cargo build --package co-cli --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tgz'
        run: |
          VERSION=${GITHUB_REF_NAME#co-cli-v}
          ARCHIVE="co-cli-${{ matrix.target }}-v${VERSION}"
          mkdir "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/co" "${ARCHIVE}/"
          tar czf "${ARCHIVE}.tgz" "${ARCHIVE}"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#co-cli-v}
          ARCHIVE="co-cli-${{ matrix.target }}-v${VERSION}"
          mkdir "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/co.exe" "${ARCHIVE}/"
          7z a "${ARCHIVE}.zip" "${ARCHIVE}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: co-cli-*.*
