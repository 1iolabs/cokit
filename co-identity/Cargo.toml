##  --> /usr/local/rust/cargo/registry/src/index.crates.io-6f17d22bba15001f/form_urlencoded-1.2.1/src/lib.rs:24:1
form_urlencoded = "=1.2.0"

[features]
"default" = []

[dev-dependencies]
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
