[package]
name = "tauri-app"
version = "0.1.0"
description = "A Tauri App"
authors = ["DH <50+dh@users.noreply.1io.com>"]
edition = "2021"
rust-version = "1.76"

[build-dependencies]
tauri-build = { version = "2.0.0-beta.19", features = [] }

[dependencies]
tauri = { version = "2.7.0", features = ["protocol-asset"] }
tauri-plugin-dialog = "2.3.1"
tauri-plugin-fs = "2.4.1"
tauri-plugin-shell = "2.3.0"
tauri-utils = { version = "2.6.0" }
tauri-plugin-co-sdk = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
toml = { workspace = true }
