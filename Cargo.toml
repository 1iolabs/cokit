[workspace]
members = [
    "api",
    "daemon",
    "node-edge",
    "pallet-co",
    "runtime-edge",
    "sdk",
    "state",
]

[profile.release]
panic = "unwind"

[workspace.dependencies]
anyhow = { version = "1", features = ["backtrace"] }
async-stream = "0.3.3"
async-trait = "0.1.57"
futures = "0.3"
futures-util = "0.3.26"
hyper = { version = "0.14.23" }
libipld = "0.15"
libp2p = "0.50.0"
# rxrust = { version = "1.0.0-beta.0", features = ["tokio-scheduler"] }
rxrust = { path = "/Users/dominik/Workspaces/github/rxRust/rxRust", features = [
    "tokio-scheduler",
] }
serde = "1"
serde_json = "1"
thiserror = "1"
tokio = "1"
tokio-context = "0.1.3"
tokio-stream = "0.1.11"
tokio-test = "0.4.2"
tokio-util = "0.7"
tracing = "0.1.34"
tracing-log = "0.1.3"
tracing-opentelemetry = "0.18"
tracing-subscriber = "0.3.14"

# substrate
sc-cli = { version = "0.10.0-dev", git = "https://github.com/paritytech/substrate.git", branch = "polkadot-v0.9.42" }
sc-executor = { version = "0.10.0-dev", git = "https://github.com/paritytech/substrate.git", branch = "polkadot-v0.9.42" }
sc-network = { version = "0.10.0-dev", git = "https://github.com/paritytech/substrate.git", branch = "polkadot-v0.9.42" }
sc-service = { version = "0.10.0-dev", git = "https://github.com/paritytech/substrate.git", branch = "polkadot-v0.9.42" }
