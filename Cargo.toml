[workspace]
members = [
    "api",
    "co-log",
    "co-macros",
    "co-messaging",
    "co-network",
    "co-primitives",
    "co-storage",
    "co-wasm-api",
    "co-wasm-runtime",
    "cores/co",
    "cores/keystore",
    "daemon",
    "did-co",
    "examples/counter",
    "examples/message",
    "sdk",
    "state",
]
resolver = "2"

[profile.release]
panic = "unwind"

[workspace.dependencies]
anyhow = { version = "1", features = ["backtrace"] }
async-stream = "0.3.3"
async-trait = "0.1.57"
futures = "0.3"
futures-util = "0.3.26"
derive_more = "0.99.17"
hyper = { version = "0.14.23" }
libipld = "0.15"
libp2p = { version = "0.50", features = ["full"] }
libp2p-core = { version = "0.38" }
rxrust = { version = "1.0.0-beta.6", git = "https://github.com/dkuhnert/rxRust.git", branch = "master", features = [
    "tokio-scheduler",
] }
serde = "1"
serde_bytes = "0.11.12"
serde_ipld_dagcbor = "0.4.2"
serde_json = "1"
serde_repr = "0.1"
smallvec = "^1.6.1"
thiserror = "1"
tokio = "1"
tokio-context = "0.1.3"
tokio-stream = "0.1.11"
tokio-test = "0.4.2"
tokio-util = "0.7"
tracing = "0.1.34"
tracing-log = "0.1.3"
tracing-opentelemetry = "0.18"
tracing-subscriber = "0.3.14"
