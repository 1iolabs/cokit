futures = "0.3"
futures-util = "0.3.26"
hyper = { version = "0.14.23" }
libipld = "0.15"
rxrust = { path = "/Users/dominik/Workspaces/github/rxRust/rxRust", features = [
    "tokio-scheduler",
] }
serde = "1"
serde_bytes = "0.11.12"
serde_cbor = "0.11.2"
serde_ipld_dagcbor = "0.4.2"
