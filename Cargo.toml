[workspace]
members = [
    "api",
    "daemon",
    "sdk",
]

[profile.release]
panic = "unwind"

[workspace.dependencies]
anyhow = { version = "1", features = ["backtrace"] }
async-trait = "0.1.57"
futures = "0.3"
libipld = "0.15"
serde = "1"
serde_json = "1"
thiserror = "1"
tokio = "1"
tokio-context = "0.1.3"
tokio-stream = "0.1.11"
tokio-test = "0.4.2"
tokio-util = "0.7"
tracing = "0.1.34"
tracing-opentelemetry = "0.18"
tracing-subscriber = "0.3.14"
