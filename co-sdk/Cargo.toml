[package]
name = "co-sdk"
version = "0.1.0"
edition = "2021"

[dependencies]
#librocksdb-sys = { version = "0.10.0+7.9.2" }
#rocksdb = { version = "0.20.1" }
anyhow = { workspace = true }
async-trait = { workspace = true }
co-core-co = { path = "../cores/co" }
co-log = { path = "../co-log" }
co-network = { path = "../co-network" }
co-primitives = { path = "../co-primitives" }
co-runtime = { path = "../co-runtime" }
co-state = { path = "../state" }
co-storage = { path = "../co-storage" }
directories = "5.0.1"
futures = { workspace = true }
hyper = { workspace = true }
keyring = "2.3.2"
libipld = { workspace = true, features = ["default", "serde-codec"] }
libp2p = { workspace = true, features = ["rendezvous", "tokio"] }
multibase = "0.9.1"
names = "0.14.0"
rxrust = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_ipld_dagcbor = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-stream = { workspace = true }
tracing = { workspace = true }
tracing-bunyan-formatter = "0.3.6"
tracing-log = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
uuid = { version = "1.2.2", features = ["default", "v4"] }

[dev-dependencies]
example-counter = { path = "../examples/counter" }

[features]
"default" = ["tokio-runtime"]
"tokio-runtime" = []
"futures-runtime" = []
