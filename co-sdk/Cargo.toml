[package]
name = "co-sdk"
version = "0.1.0"
edition = "2021"

[dependencies]
#librocksdb-sys = { version = "0.10.0+7.9.2" }
#rocksdb = { version = "0.20.1" }
anyhow = { workspace = true }
async-stream = { workspace = true }
async-trait = { workspace = true }
co-api = { path = "../co-api" }
co-core-co = { path = "../cores/co" }
co-core-data-series = { path = "../cores/data-series" }
co-core-file = { path = "../cores/file" }
co-core-keystore = { path = "../cores/keystore" }
co-core-membership = { path = "../cores/membership" }
co-core-pin = { path = "../cores/pin" }
co-core-role = { path = "../cores/role" }
co-core-room = { path = "../cores/room" }
co-identity = { path = "../co-identity" }
co-log = { path = "../co-log" }
co-network = { path = "../co-network" }
co-primitives = { path = "../co-primitives" }
co-runtime = { path = "../co-runtime" }
co-storage = { path = "../co-storage" }
directories = "5.0.1"
futures = { workspace = true }
hyper = { workspace = true }
keyring = "2.3.2"
libipld = { workspace = true, features = ["default", "serde-codec"] }
libp2p = { workspace = true, features = ["rendezvous", "tokio"] }
multibase = "0.9.1"
names = "0.14.0"
notify = "6.1.1"
pin-project = { workspace = true }
rxrust = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_ipld_dagcbor = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
tracing-bunyan-formatter = "0.3.6"
tracing-log = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
uuid = { workspace = true }

[dev-dependencies]
example-counter = { path = "../examples/counter" }

[features]
"default" = ["tokio-runtime"]
"tokio-runtime" = []
"futures-runtime" = []
