[package]
name = "co-sdk"
version = "0.1.0"
edition = "2021"

[dependencies]
#librocksdb-sys = { version = "0.10.0+7.9.2" }
#rocksdb = { version = "0.20.1" }
anyhow = { workspace = true }
async-trait = { workspace = true }
co-network = { path = "../co-network" }
co-runtime = { path = "../co-runtime" }
co-state = { path = "../state" }
co-storage = { path = "../co-storage" }
futures = { workspace = true }
hyper = { workspace = true }
libipld = { workspace = true, features = ["default", "serde-codec"] }
libp2p = { workspace = true, features = ["rendezvous", "tokio"] }
names = "0.14.0"
rxrust = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true, features = ["macros"] }
tokio-stream = { workspace = true, optional = true }
tracing = { workspace = true }
uuid = { version = "1.2.2", features = ["default", "v4"] }

[features]
"default" = ["tokio-runtime"]
"tokio-runtime" = ["tokio", "tokio-stream"]
"futures-runtime" = []
