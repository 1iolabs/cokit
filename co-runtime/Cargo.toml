[package]
name = "co-runtime"
version = "0.1.0"
edition = "2021"
rust-version = "1.91"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
cid = { workspace = true }
co-api = { workspace = true }
co-primitives = { workspace = true }
co-storage = { workspace = true }
colored = "2.1.0"
derive_more = { workspace = true }
futures = { workspace = true }
ipld-core = { workspace = true }
rust-unixfs = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_bytes = { workspace = true }
serde_repr = { workspace = true }
target-lexicon = "0.12"
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "sync"] }
tokio-stream = { workspace = true, default-features = false, optional = true }
tracing = { workspace = true }
uuid = { workspace = true }
wasmer = { version = "7.0.1", default-features = false }
wasmer-compiler = { version = "7.0.1", optional = true }
wasmer-compiler-cranelift = { version = "7.0.1", optional = true }
wasmer-compiler-llvm = { version = "7.0.1", optional = true }
wasmer-types = { version = "7.0.1" }

[dev-dependencies]
hexdump = "0.1.1"
insta = { version = "1.34.0", features = ["default", "yaml"] }
tracing-subscriber = { workspace = true }
wasmer = { version = "7.0.1" }

[features]
default = []
native = ["wasmer/compiler", "fs"]
web = ["uuid/js", "js"]
fs = []

# backends
llvm = ["wasmer/llvm", "dep:wasmer-compiler", "dep:wasmer-compiler-llvm"]
cranelift = ["wasmer/cranelift", "dep:wasmer-compiler", "dep:wasmer-compiler-cranelift"]
wasmi = ["wasmer/wasmi"]
wamr = ["wasmer/wamr"]
js = ["wasmer/js-default"]

# meta
apple-sandbox = ["wasmi"]
