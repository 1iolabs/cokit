[package]
name = "co-runtime"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["lib", "cdylib"]


[dependencies]
anyhow = { workspace = true }
co-wasm-api = { path = "../co-wasm-api" }
libipld = { workspace = true, features = ["default", "serde-codec"] }
serde = { workspace = true, features = ["derive"] }
serde_ipld_dagcbor = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
co-storage = { path = "../co-storage" }
co-wasm-runtime = { path = "../co-wasm-runtime" }
co-primitives = { path = "../co-primitives" }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[build-dependencies]
prost-build = { version = "0.11" }
