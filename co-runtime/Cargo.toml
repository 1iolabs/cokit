[package]
name = "co-runtime"
version = "0.1.0"
edition = "2021"
rust-version = "1.76"

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
cid = { workspace = true }
co-api = { workspace = true }
co-primitives = { workspace = true }
co-storage = { workspace = true }
colored = "2.1.0"
derive_more = { workspace = true }
futures = { workspace = true }
ipld-core = { workspace = true }
rust-unixfs = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_bytes = { workspace = true }
serde_repr = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "sync"] }
tokio-stream = { workspace = true, optional = true }
tracing = { workspace = true }
uuid = { workspace = true }
wasmer = "6.0.1"
wasmer-compiler = { version = "6.0.1", optional = true }
wasmer-compiler-llvm = { version = "6.0.1", optional = true }
wasmer-types = { version = "6.0.1", optional = true }

[dev-dependencies]
hexdump = "0.1.1"
insta = { version = "1.34.0", features = ["default", "yaml"] }
tracing-subscriber = { workspace = true }

[features]
default = []
llvm = ["wasmer-compiler-llvm", "wasmer-compiler", "wasmer-types"]
