[package]
name = "co-core-room"
version = "0.1.0"
edition = "2021"
rust-version = "1.91"
license = "AGPL-3.0-only"
homepage = "https://www.cokit.org"
repository = "https://github.com/1iolabs/cokit.git"
documentation = "https://www.cokit.org/docs/"
description = "Messaging room core."

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
anyhow = { workspace = true }
cid = { workspace = true }
co-api = { workspace = true }
co-messaging = { workspace = true }
co-primitives = { workspace = true }
futures = { workspace = true }
ipld-core = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0.108"
serde_repr = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
co-storage = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time", "io-util"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[features]
"core" = []
