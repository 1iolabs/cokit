[package]
name = "example-counter"
version = "0.1.0"
edition = "2021"
rust-version = "1.76"

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
anyhow = { workspace = true }
co-api = { path = "../../co-api" }
libipld = { workspace = true, features = ["default", "serde-codec"] }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }

[dev-dependencies]
co-primitives = { path = "../../co-primitives" }
co-runtime = { path = "../../co-runtime" }
co-sdk = { path = "../../co-sdk" }
co-storage = { path = "../../co-storage" }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
