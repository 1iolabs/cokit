[dev-dependencies]
co-primitives = { workspace = true }
co-runtime = { workspace = true }
co-sdk = { workspace = true }
co-storage = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[features]
"core" = []
