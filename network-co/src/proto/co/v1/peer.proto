syntax = "proto3";

package co.v1.discovery;

import "google/protobuf/any.proto";


enum ResponseStatus
{
    OK = 200,
    ACCEPTED = 202,
    INTERNAL_SERVER_ERROR = 500,
}

message Request
{
    string contentType = 1;
    bytes content = 2;
}

message Response
{
    ResponseStatus status = 1;
    string contentType = 1;
    bytes content = 2;
}
